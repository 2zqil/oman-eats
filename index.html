<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0e0b1a" />
<title>Oman Eats — Find your best bite</title>
<style>
:root{
  --bg:#0e0b1a; --bg2:#171232; --card:#1d1840; --ink:#f4f1ff; --muted:#a79fce;
  --accent:#ff5a7e; --accent2:#ffb648; --green:#38d39f; --radius:26px;
  --shadow:0 30px 60px -20px rgba(0,0,0,.7);
  --spring:cubic-bezier(.34,1.56,.64,1);
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;color:var(--ink);font-family:"Segoe UI",system-ui,-apple-system,"Helvetica Neue",sans-serif;overflow:hidden}
body{
  background:
    radial-gradient(1200px 700px at 80% -10%, #2a1f5e 0%, transparent 60%),
    radial-gradient(900px 600px at -10% 110%, #3a1f4a 0%, transparent 55%),
    var(--bg);
  background-attachment:fixed;
}
/* animated aurora */
body::before{
  content:"";position:fixed;inset:-30%;z-index:-1;pointer-events:none;
  background:
    radial-gradient(40% 40% at 30% 30%, rgba(255,90,126,.10), transparent 70%),
    radial-gradient(40% 40% at 70% 60%, rgba(255,182,72,.08), transparent 70%),
    radial-gradient(40% 40% at 50% 80%, rgba(56,211,159,.07), transparent 70%);
  animation:aurora 18s ease-in-out infinite alternate;
}
@keyframes aurora{0%{transform:translate(0,0) scale(1)}50%{transform:translate(4%, -3%) scale(1.08)}100%{transform:translate(-3%,3%) scale(1.03)}}

/* ===== Layout ===== */
.shell{height:100dvh;display:flex;justify-content:center;gap:34px;padding:0 18px;align-items:center}
.app{height:100dvh;display:grid;grid-template-rows:auto auto 1fr auto;width:100%;max-width:460px;position:relative}

/* ===== Header ===== */
header{padding:20px 8px 6px;display:flex;align-items:center;justify-content:space-between;gap:12px;animation:dropIn .6s var(--ease) both}
.logo{font-weight:800;font-size:23px;letter-spacing:-.5px;display:flex;align-items:center;gap:9px}
.logo .mark{font-size:26px;animation:wiggle 4s ease-in-out infinite}
@keyframes wiggle{0%,92%,100%{transform:rotate(0)}94%{transform:rotate(-18deg)}96%{transform:rotate(14deg)}98%{transform:rotate(-6deg)}}
.logo span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
.logo small{display:block;font-size:10px;font-weight:700;letter-spacing:2.5px;color:var(--muted);margin-top:-1px}
.iconbtn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:var(--ink);width:44px;height:44px;border-radius:14px;font-size:18px;cursor:pointer;transition:transform .25s var(--spring),background .2s;position:relative;display:grid;place-items:center}
.iconbtn:hover{background:rgba(255,255,255,.13);transform:translateY(-3px)}
.iconbtn:active{transform:scale(.9)}
.talabat-browse{text-decoration:none;color:#ff7a1a}
.badge{position:absolute;top:-7px;right:-7px;background:var(--accent);color:#fff;font-size:11px;font-weight:800;min-width:21px;height:21px;border-radius:11px;display:none;place-items:center;padding:0 5px;animation:pop .4s var(--spring)}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}

/* ===== Filters ===== */
.filters{display:flex;gap:8px;overflow-x:auto;padding:10px 8px 14px;scrollbar-width:none;animation:dropIn .6s .05s var(--ease) both}
.filters::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:var(--muted);padding:9px 15px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:transform .25s var(--spring),background .2s,color .2s}
.chip:hover{color:var(--ink);transform:translateY(-2px)}
.chip:active{transform:scale(.94)}
.chip.active{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;box-shadow:0 8px 20px -6px var(--accent)}

/* ===== Deck ===== */
.deck-wrap{position:relative;min-height:0}
.deck{position:absolute;inset:6px 6px 0;perspective:1400px}
.card{position:absolute;inset:0;border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow);overflow:hidden;cursor:grab;user-select:none;display:flex;flex-direction:column;will-change:transform;border:1px solid rgba(255,255,255,.07);transition:transform .55s var(--spring),opacity .4s}
.card.dragging{transition:none}
.card:active{cursor:grabbing}
.card .hero{height:48%;position:relative;display:grid;place-items:center;overflow:hidden}
.card .hero .emoji{filter:drop-shadow(0 10px 18px rgba(0,0,0,.4));animation:float 5s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.card .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 38%,rgba(0,0,0,.55) 100%)}
/* generated brand logo emblem */
.brand{position:relative;border-radius:28%;display:grid;place-items:center;font-weight:800;color:#fff;letter-spacing:.5px;box-shadow:0 12px 26px -8px rgba(0,0,0,.6);border:2px solid rgba(255,255,255,.22);text-shadow:0 2px 8px rgba(0,0,0,.35);flex:0 0 auto;z-index:2}
.brand .em{position:absolute;bottom:-7px;right:-7px;font-size:.5em;filter:drop-shadow(0 2px 4px rgba(0,0,0,.45))}
.brand .logo-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#fff;border-radius:inherit;padding:14%;box-sizing:border-box}
.brand.hero-brand .logo-img{padding:16%}
.brand.av-brand .logo-img{padding:11%}
.brand.hero-brand{width:120px;height:120px;font-size:42px;letter-spacing:1px;animation:float 5s ease-in-out infinite}
.brand.av-brand{width:46px;height:46px;font-size:17px;border-radius:30%}
.brand.best-brand{width:58px;height:58px;font-size:21px;border-radius:30%}
.sell{font-size:12.5px;color:var(--green);font-weight:600}
.sell b{color:var(--ink);font-weight:700}
/* Talabat order button */
.tlb{display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;background:linear-gradient(90deg,#ff5a00,#ff8c1a);color:#fff;font-weight:800;font-size:13.5px;padding:11px 12px;border-radius:14px;margin-top:10px;box-shadow:0 12px 24px -12px #ff5a00;transition:transform .25s var(--spring),filter .2s;text-align:center}
.tlb:hover{filter:brightness(1.08);transform:translateY(-2px)}
.tlb:active{transform:scale(.97)}
.tlb.off{background:rgba(255,255,255,.06);color:var(--muted);box-shadow:none;font-weight:600;cursor:default}
/* action button row (Talabat + Google Maps) */
.acts{display:flex;gap:8px;margin-top:10px}
.acts>*{margin-top:0;flex:1 1 0;min-width:0}
.gmap{display:flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;background:linear-gradient(90deg,#1a73e8,#34a853);color:#fff;font-weight:800;font-size:13.5px;padding:11px 8px;border-radius:14px;box-shadow:0 12px 24px -12px #1a73e8;transition:transform .25s var(--spring),filter .2s;text-align:center;white-space:nowrap}
.gmap:hover{filter:brightness(1.08);transform:translateY(-2px)}
.gmap:active{transform:scale(.97)}
.pill{position:absolute;top:14px;background:rgba(0,0,0,.42);backdrop-filter:blur(8px);padding:6px 12px;border-radius:999px;font-size:13px;font-weight:700;z-index:2}
.pill.price{left:14px}
.pill.rating{right:14px;color:var(--accent2)}
.card .body{padding:16px 20px 20px;flex:1;display:flex;flex-direction:column;gap:8px;min-height:0}
.card h2{font-size:24px;letter-spacing:-.4px;line-height:1.1}
.meta{color:var(--muted);font-size:13px;display:flex;gap:12px;flex-wrap:wrap}
.meta b{color:var(--ink);font-weight:600}
.sig{font-size:13px;color:var(--accent2);font-weight:600}
.desc{font-size:13.5px;color:var(--muted);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto;padding-top:6px}
.tag{font-size:11px;font-weight:600;background:rgba(255,255,255,.07);padding:5px 10px;border-radius:999px}
.stamp{position:absolute;top:32px;z-index:3;font-size:30px;font-weight:900;letter-spacing:1px;padding:6px 16px;border-radius:12px;border:4px solid;opacity:0;pointer-events:none;text-transform:uppercase}
.stamp.like{left:20px;color:var(--green);border-color:var(--green);transform:rotate(-18deg)}
.stamp.nope{right:20px;color:var(--accent);border-color:var(--accent);transform:rotate(18deg)}
.card.enter{animation:cardIn .5s var(--spring)}
@keyframes cardIn{from{transform:translateY(26px) scale(.92);opacity:0}to{opacity:1}}

.empty{position:absolute;inset:0;border-radius:var(--radius);display:grid;place-items:center;text-align:center;padding:30px;background:var(--card);border:1px dashed rgba(255,255,255,.15);animation:cardIn .5s var(--spring)}
.empty .big{font-size:56px;animation:float 4s ease-in-out infinite}
.empty h3{font-size:21px;margin:10px 0 6px}
.empty p{color:var(--muted);font-size:14px;margin-bottom:18px;max-width:280px}

/* ===== Controls ===== */
.controls{display:flex;align-items:center;justify-content:center;gap:15px;padding:16px 0 8px;animation:dropIn .6s .1s var(--ease) both}
.fab{border:none;cursor:pointer;border-radius:50%;display:grid;place-items:center;transition:transform .3s var(--spring),box-shadow .2s;box-shadow:0 12px 28px -10px rgba(0,0,0,.7);position:relative;overflow:hidden}
.fab:hover{transform:translateY(-5px) scale(1.06)}
.fab:active{transform:scale(.88)}
.fab.big{width:66px;height:66px;font-size:27px}
.fab.sm{width:52px;height:52px;font-size:20px}
.fab.nope{background:#fff;color:var(--accent)}
.fab.like{background:linear-gradient(135deg,var(--green),#2bb98a);color:#fff}
.fab.info{background:#fff;color:#6b4bff}
.fab.undo{background:rgba(255,255,255,.1);color:var(--accent2)}
.fab.star{background:rgba(255,255,255,.1);color:var(--accent2)}
.fab .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.5);transform:scale(0);animation:ripple .5s ease-out;pointer-events:none}
@keyframes ripple{to{transform:scale(2.4);opacity:0}}
.hint{text-align:center;color:var(--muted);font-size:12px;padding:2px 0 14px;animation:dropIn .6s .15s var(--ease) both}

/* ===== Desktop sidebar ===== */
.side{display:none;width:360px;max-width:360px;height:78dvh;flex-direction:column;background:rgba(23,18,50,.6);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:22px;animation:dropIn .7s .1s var(--ease) both;overflow:auto}
.side h3{font-size:18px;margin-bottom:2px}
.side .sub{color:var(--muted);font-size:12.5px;margin-bottom:16px}

/* best + list (shared) */
.best{background:linear-gradient(135deg,rgba(255,90,126,.28),rgba(255,182,72,.2));border:1px solid rgba(255,182,72,.4);border-radius:18px;padding:16px;margin-bottom:16px;display:flex;gap:14px;align-items:center;animation:bestPop .55s var(--spring)}
@keyframes bestPop{from{transform:scale(.85);opacity:0}to{opacity:1}}
.best .av,.li .av{border-radius:14px;display:grid;place-items:center;flex:0 0 auto}
.best .av{width:56px;height:56px;font-size:30px}
.best .crown{font-size:12px;color:var(--accent2);font-weight:800;letter-spacing:1.2px}
.best .info b{font-size:17px}
.best .info small{color:var(--muted);display:block}
.li{display:flex;align-items:center;gap:12px;padding:11px;border-radius:16px;background:rgba(255,255,255,.04);margin-bottom:10px;animation:slideUp .4s var(--ease) both}
.li:hover{background:rgba(255,255,255,.08)}
.li .av{width:46px;height:46px;font-size:23px}
.li .info{flex:1;min-width:0}
.li .info b{display:block;font-size:15px}
.li .info small{color:var(--muted)}
.li .score{font-weight:800;color:var(--accent2);font-size:15px}
.li .bar{height:4px;border-radius:3px;background:rgba(255,255,255,.1);margin-top:5px;overflow:hidden}
.li .bar i{display:block;height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:width .8s var(--ease)}
@keyframes slideUp{from{transform:translateY(14px);opacity:0}to{opacity:1}}

/* ===== Bottom sheet (mobile) ===== */
.sheet{position:fixed;inset:0;z-index:40;background:rgba(5,3,15,.6);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.sheet.open{opacity:1;pointer-events:auto}
.sheet .panel{background:var(--bg2);width:100%;max-width:480px;border-radius:24px 24px 0 0;padding:18px 22px 34px;transform:translateY(100%);transition:transform .42s var(--spring);max-height:84dvh;overflow:auto;border-top:1px solid rgba(255,255,255,.1)}
.sheet.open .panel{transform:translateY(0)}
.grab{width:44px;height:5px;border-radius:3px;background:rgba(255,255,255,.2);margin:0 auto 14px}
.panel h3{font-size:20px;margin-bottom:2px}
.panel .sub{color:var(--muted);font-size:13px;margin-bottom:16px}

.btn{width:100%;border:none;cursor:pointer;padding:14px;border-radius:16px;font-size:15px;font-weight:700;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;margin-top:12px;transition:transform .25s var(--spring),filter .2s}
.btn:hover{filter:brightness(1.08);transform:translateY(-2px)}
.btn:active{transform:scale(.97)}
.btn.ghost{background:rgba(255,255,255,.08);color:var(--ink)}

.toast{position:fixed;bottom:104px;left:50%;transform:translateX(-50%) translateY(24px);background:#fff;color:#1a1430;font-weight:700;font-size:14px;padding:12px 20px;border-radius:999px;opacity:0;transition:transform .35s var(--spring),opacity .3s;z-index:60;box-shadow:0 16px 40px -12px rgba(0,0,0,.6);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes dropIn{from{transform:translateY(-14px);opacity:0}to{opacity:1}}

/* sparkle burst on best choice */
.spark{position:fixed;width:9px;height:9px;border-radius:2px;pointer-events:none;z-index:70}

/* ===== Desktop breakpoint ===== */
@media(min-width:920px){
  .side{display:flex}
  .app{height:auto;max-width:430px}
  .deck-wrap{height:64dvh}
  .shell{align-items:center}
  .hint{padding-bottom:2px}
  #btnMatches{display:none}
}
@media(min-width:920px) and (max-height:760px){.deck-wrap{height:58dvh}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div class="shell">
  <div class="app">
    <header>
      <div class="logo"><span class="mark">🍴</span><div>Oman <span>Eats</span><small>SWIPE · SAVOUR · DECIDE</small></div></div>
      <div style="display:flex;gap:8px">
        <a class="iconbtn talabat-browse" href="https://www.talabat.com/oman/restaurants" target="_blank" rel="noopener" title="Browse every restaurant on Talabat Oman">🛵</a>
        <button class="iconbtn" id="btnMatches" title="My matches">💚<span class="badge" id="likeBadge">0</span></button>
      </div>
    </header>
    <div class="filters" id="filters"></div>
    <div class="deck-wrap"><div class="deck" id="deck"></div></div>
    <div>
      <div class="controls">
        <button class="fab sm undo" id="btnUndo" title="Undo (↓)">↩️</button>
        <button class="fab big nope" id="btnNope" title="Pass (←)">✖️</button>
        <button class="fab sm info" id="btnInfo" title="Signature dish">ℹ️</button>
        <button class="fab big like" id="btnLike" title="Save (→)">💚</button>
        <button class="fab sm star" id="btnStar" title="Best choice">🏆</button>
      </div>
      <div class="hint">Drag the card · use ← → keys · or tap the buttons</div>
    </div>
  </div>

  <!-- Desktop sidebar: live matches -->
  <aside class="side">
    <h3>Your Matches & Best Choice</h3>
    <div class="sub">Ranked live by your taste — cuisine, vibe, price &amp; rating.</div>
    <div id="sideBody"></div>
  </aside>
</div>

<!-- Mobile bottom sheet -->
<div class="sheet" id="sheet">
  <div class="panel">
    <div class="grab"></div>
    <h3>Your Matches & Best Choice</h3>
    <div class="sub">We rank your saved spots by your taste.</div>
    <div id="sheetBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

/* ============================================================
   Engine
   ============================================================ */
const $=(s,el=document)=>el.querySelector(s), $$=(s,el=document)=>[...el.querySelectorAll(s)];
const PRICE=["","OMR","OMR·OMR","OMR·OMR·OMR","OMR·OMR·OMR·OMR"];
const PRICE_LABEL=["","Budget","Mid","Upscale","Fine dining"];
const state={filter:"All",queue:[],liked:[],passed:[],history:[]};

function buildFilters(){
  const bar=$("#filters");
  bar.innerHTML=ORDS.cats.map((c,i)=>`<button class="chip ${i?"":"active"}" data-c="${c}">${c}</button>`).join("");
  $$(".chip",bar).forEach(ch=>ch.addEventListener("click",()=>{
    $$(".chip",bar).forEach(c=>c.classList.remove("active"));ch.classList.add("active");
    state.filter=ch.dataset.c;resetQueue();
  }));
}
function resetQueue(){
  const seen=new Set([...state.liked,...state.passed].map(r=>r.id));
  state.queue=ORDS.restaurants.filter(r=>state.filter==="All"||r.cat===state.filter).filter(r=>!seen.has(r.id));
  renderDeck();
}
function grad(r,l1=32,l2=20){return `linear-gradient(160deg,hsl(${r.hue} 70% ${l1}%),hsl(${(r.hue+40)%360} 65% ${l2}%))`}
const STOP=new Set(["al","the","de","la","el","and"]);
function initials(n){const w=n.replace(/[^A-Za-z' ]/g," ").split(/\s+/).filter(x=>x&&!STOP.has(x.toLowerCase()));const a=(w[0]||"")[0]||"";const b=(w[1]||"")[0]||(w[0]||"")[1]||"";return (a+b).toUpperCase();}
function brand(r,cls){
  const inner=initials(r.name)+(r.domain?"":`<span class="em">${r.emoji}</span>`);
  // Real logo from a public logo service; on failure fall back to favicon, then to the monogram beneath.
  const img=r.domain?`<img class="logo-img" alt="" loading="lazy" src="https://logo.clearbit.com/${r.domain}" onerror="if(!this.dataset.fb){this.dataset.fb=1;this.src='https://www.google.com/s2/favicons?sz=128&amp;domain=${r.domain}'}else{this.style.display='none'}">`:"";
  return `<div class="brand ${cls}" style="background:${grad(r,44,28)}">${inner}${img}</div>`;
}
function maps(r){const q=r.name+" "+r.area.replace("Multiple branches, ","");return "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(q);}
function cardHTML(r){
  return `<div class="card" data-id="${r.id}">
    <div class="stamp like">Yum</div><div class="stamp nope">Nope</div>
    <div class="hero" style="background:${grad(r)}">${brand(r,"hero-brand")}
      <div class="pill price">💰 ~${r.avg} OMR</div><div class="pill rating">★ ${r.rating.toFixed(1)}</div></div>
    <div class="body"><h2>${r.name}</h2>
      <div class="meta"><span>📍 <b>${r.area}</b></span><span>🍽️ ${r.cuisine}</span><span>${PRICE_LABEL[r.price]}</span></div>
      <div class="sig">🌟 ${r.signature}</div>
      <div class="sell">🔥 Bestseller: <b>${r.bestseller}</b></div>
      <div class="desc">${r.desc}</div>
      <div class="tags">${r.vibe.map(v=>`<span class="tag">${v}</span>`).join("")}</div>
      <div class="acts">
        ${talabatUrl(r)?`<a class="tlb" href="${talabatUrl(r)}" target="_blank" rel="noopener" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" onclick="event.stopPropagation()">🛵 Talabat</a>`:`<div class="tlb off">🍽️ Dine-in only</div>`}
        <a class="gmap" href="${maps(r)}" target="_blank" rel="noopener" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" onclick="event.stopPropagation()">📍 Maps</a>
      </div>
      </div></div>`;
}
function renderDeck(){
  const deck=$("#deck");deck.innerHTML="";
  if(!state.queue.length){
    deck.innerHTML=`<div class="empty"><div><div class="big">🍽️</div>
      <h3>That's everything!</h3>
      <p>You've browsed all ${state.filter==="All"?"":state.filter+" "}spots.
      ${state.liked.length?"Check your matches for the winner.":"Try another filter."}</p>
      <button class="btn" onclick="openSheet()">View matches (${state.liked.length})</button>
      <button class="btn ghost" onclick="reshuffle()">Start over</button></div></div>`;
    updateBadges();return;
  }
  const top3=state.queue.slice(0,3).reverse();
  top3.forEach((r,i)=>{
    deck.insertAdjacentHTML("beforeend",cardHTML(r));
    const card=deck.lastElementChild,depth=top3.length-1-i;
    card.style.transform=`translateY(${depth*12}px) scale(${1-depth*.045})`;
    card.style.zIndex=10-depth;card.style.opacity=depth>1?.55:1;
    if(depth===0){card.classList.add("enter");attachDrag(card,r);}
  });
  updateBadges();
}
function updateBadges(){
  $("#likeBadge").textContent=state.liked.length;
  $("#likeBadge").style.display=state.liked.length?"grid":"none";
  renderMatches($("#sideBody"));
}
function attachDrag(card,r){
  let sx=0,sy=0,dx=0,dy=0,drag=false;
  const down=(x,y)=>{drag=true;sx=x;sy=y;card.classList.add("dragging")};
  const move=(x,y)=>{if(!drag)return;dx=x-sx;dy=y-sy;
    card.style.transform=`translate(${dx}px,${dy}px) rotate(${dx/18}deg)`;
    const t=Math.min(Math.abs(dx)/120,1);
    $(".stamp.like",card).style.opacity=dx>0?t:0;$(".stamp.nope",card).style.opacity=dx<0?t:0;};
  const up=()=>{if(!drag)return;drag=false;card.classList.remove("dragging");
    if(Math.abs(dx)>108)decide(dx>0?"like":"pass");
    else{card.style.transform="";$(".stamp.like",card).style.opacity=0;$(".stamp.nope",card).style.opacity=0;}
    dx=dy=0;};
  card.addEventListener("mousedown",e=>down(e.clientX,e.clientY));
  window.addEventListener("mousemove",e=>move(e.clientX,e.clientY));
  window.addEventListener("mouseup",up);
  card.addEventListener("touchstart",e=>down(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
  card.addEventListener("touchmove",e=>move(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
  card.addEventListener("touchend",up);
}
function decide(action){
  const r=state.queue.shift();if(!r)return;
  const card=$(`.card[data-id="${r.id}"]`);
  if(card){const d=action==="like"?1:-1;
    card.style.transition="transform .45s ease,opacity .45s";
    card.style.transform=`translate(${d*640}px,-50px) rotate(${d*32}deg)`;card.style.opacity=0;}
  if(action==="like"){state.liked.push(r);toast(`Saved ${r.name} 😋`);}
  else state.passed.push(r);
  state.history.push({r,action});
  save();
  setTimeout(renderDeck,170);
}
function undo(){
  const last=state.history.pop();if(!last){toast("Nothing to undo");return;}
  if(last.action==="like")state.liked=state.liked.filter(x=>x.id!==last.r.id);
  else state.passed=state.passed.filter(x=>x.id!==last.r.id);
  state.queue.unshift(last.r);save();renderDeck();toast("Brought it back ↩️");
}
function reshuffle(){state.passed=[];state.history=[];save();resetQueue();}

/* taste model */
function buildPrefs(){
  const p={cuisine:{},vibe:{},avgPrice:2};
  if(!state.liked.length)return p;let sum=0;
  state.liked.forEach(r=>{p.cuisine[r.cuisine]=(p.cuisine[r.cuisine]||0)+1;
    r.vibe.forEach(v=>p.vibe[v]=(p.vibe[v]||0)+1);sum+=r.price;});
  p.avgPrice=sum/state.liked.length;return p;
}
function scoreFor(r,p){let s=r.rating*10;s+=(p.cuisine[r.cuisine]||0)*8;
  r.vibe.forEach(v=>s+=(p.vibe[v]||0)*5);s-=Math.abs(r.price-p.avgPrice)*4;return s;}

function renderMatches(wrap){
  if(!wrap)return;
  if(!state.liked.length){wrap.innerHTML=`<p style="color:var(--muted);font-size:13.5px;padding:24px 4px;text-align:center">No matches yet — swipe right (or tap 💚) on spots you like and your <b style="color:var(--accent2)">best choice</b> appears here.</p>`;return;}
  const p=buildPrefs();
  const ranked=[...state.liked].map(r=>({r,score:scoreFor(r,p)})).sort((a,b)=>b.score-a.score);
  const best=ranked[0].r,max=ranked[0].score;
  wrap.innerHTML=`
    <div class="best">${brand(best,"best-brand")}
      <div class="info"><div class="crown">👑 YOUR BEST CHOICE</div><b>${best.name}</b>
      <small>${best.area} · ${best.cuisine} · ★${best.rating} · ~${best.avg} OMR</small>
      <small>🔥 ${best.bestseller}</small></div></div>
    <div class="acts">
      ${talabatUrl(best)?`<a class="tlb" href="${talabatUrl(best)}" target="_blank" rel="noopener">🛵 Order on Talabat</a>`:`<div class="tlb off">🍽️ Dine-in only</div>`}
      <a class="gmap" href="${maps(best)}" target="_blank" rel="noopener">📍 Google Maps</a>
    </div>
    <div style="font-size:12.5px;color:var(--muted);margin:14px 2px 10px">${state.liked.length} saved · ranked by your taste</div>
    ${ranked.map(({r,score})=>{const pct=Math.round(score/max*100);
      return `<div class="li">${brand(r,"av-brand")}
        <div class="info"><b>${r.name}</b><small>${r.area.split(",").pop().trim()} · ~${r.avg} OMR · 🔥 ${r.bestseller}</small>
        <div class="bar"><i data-w="${pct}"></i></div></div><div class="score">${pct}%</div></div>`;}).join("")}
    <button class="btn ghost" onclick="clearMatches()">Clear matches</button>`;
  requestAnimationFrame(()=>$$(".bar i",wrap).forEach(b=>b.style.width=b.dataset.w+"%"));
}
function clearMatches(){state.liked=[];save();renderDeck();renderMatches($("#sheetBody"));renderMatches($("#sideBody"));}

/* sheet */
function openSheet(){renderMatches($("#sheetBody"));$("#sheet").classList.add("open");}
function closeSheet(){$("#sheet").classList.remove("open");}

/* sparkle burst */
function sparkle(){
  const colors=["#ff5a7e","#ffb648","#38d39f","#fff"];
  for(let i=0;i<18;i++){
    const s=document.createElement("div");s.className="spark";
    s.style.background=colors[i%4];
    s.style.left="50%";s.style.top="46%";
    document.body.appendChild(s);
    const ang=(i/18)*Math.PI*2,dist=80+Math.random()*120;
    s.animate([{transform:"translate(-50%,-50%) scale(1)",opacity:1},
      {transform:`translate(${Math.cos(ang)*dist-50}%,${Math.sin(ang)*dist-50}%) scale(0)`,opacity:0}],
      {duration:700+Math.random()*300,easing:"cubic-bezier(.2,.6,.3,1)"}).onfinish=()=>s.remove();
  }
}

/* toast */
let tT;function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(tT);tT=setTimeout(()=>t.classList.remove("show"),1500);}

/* ripple */
function ripple(e){const b=e.currentTarget,c=document.createElement("span");c.className="ripple";
  const d=Math.max(b.clientWidth,b.clientHeight);c.style.width=c.style.height=d+"px";
  const r=b.getBoundingClientRect();c.style.left=(e.clientX-r.left-d/2)+"px";c.style.top=(e.clientY-r.top-d/2)+"px";
  b.appendChild(c);setTimeout(()=>c.remove(),500);}

/* persistence */
function save(){try{localStorage.setItem("omanEats",JSON.stringify({liked:state.liked.map(r=>r.id),passed:state.passed.map(r=>r.id)}));}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem("omanEats")||"{}");
  if(d.liked)state.liked=d.liked.map(id=>ORDS.restaurants.find(r=>r.id===id)).filter(Boolean);
  if(d.passed)state.passed=d.passed.map(id=>ORDS.restaurants.find(r=>r.id===id)).filter(Boolean);}catch(e){}}

/* keyboard */
window.addEventListener("keydown",e=>{
  if($("#sheet").classList.contains("open")&&e.key==="Escape")return closeSheet();
  if(!state.queue.length)return;
  if(e.key==="ArrowRight")decide("like");
  if(e.key==="ArrowLeft")decide("pass");
  if(e.key==="ArrowDown"||e.key.toLowerCase()==="z")undo();
});

function init(){
  load();buildFilters();resetQueue();
  $("#btnLike").addEventListener("click",e=>{ripple(e);state.queue.length&&decide("like");});
  $("#btnNope").addEventListener("click",e=>{ripple(e);state.queue.length&&decide("pass");});
  $("#btnUndo").addEventListener("click",e=>{ripple(e);undo();});
  $("#btnInfo").addEventListener("click",e=>{ripple(e);const r=state.queue[0];if(r)toast(`${r.signature} — ${PRICE_LABEL[r.price]}`);});
  const showBest=()=>{if(state.liked.length)sparkle();if(window.innerWidth<920)openSheet();else $(".side").scrollTo({top:0,behavior:"smooth"});};
  $("#btnStar").addEventListener("click",e=>{ripple(e);showBest();});
  $("#btnMatches").addEventListener("click",openSheet);
  $("#sheet").addEventListener("click",e=>{if(e.target===$("#sheet"))closeSheet();});
  window.addEventListener("resize",renderDeck);
}
window.openSheet=openSheet;window.closeSheet=closeSheet;window.reshuffle=reshuffle;window.clearMatches=clearMatches;
document.addEventListener("DOMContentLoaded",init);
</script>
</body>
</html>
